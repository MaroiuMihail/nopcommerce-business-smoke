services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=StrongPassw0rd!2026
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'StrongPassw0rd!2026' -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  nopcommerce:
    image: nopcommerceteam/nopcommerce:latest
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_URLS=http://+:80
    volumes:
      - nop_appdata:/app/App_Data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/install >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  sql_data:
  nop_appdata:
