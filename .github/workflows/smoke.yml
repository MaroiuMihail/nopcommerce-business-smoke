name: Business Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Start containers
        run: docker compose up -d

      - name: Show containers
        run: |
          docker compose ps
          docker compose logs --no-color --tail=60 sqlserver || true
          docker compose logs --no-color --tail=60 nopcommerce || true


      - name: Wait for SQL Server
        shell: bash
        run: |
          # figure out the compose default network name
          NET="$(docker network ls --format '{{.Name}}' | grep '_default$' | head -n 1)"
          echo "Using network: $NET"

          for i in {1..60}; do
            if docker run --rm --network "$NET" mcr.microsoft.com/azure-sql-edge:latest \
              /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P 'yourStrong(!)Password' -Q "SELECT 1" >/dev/null 2>&1; then
              echo "SQL Server is ready!"
              exit 0
            fi
            echo "Waiting for SQL Server... ($i)"
            sleep 2
          done

          echo "SQL Server not ready"
          docker compose logs --no-color --tail=200 sqlserver || true
          exit 1


      - name: Wait for nopCommerce
        shell: bash
        run: |
          for i in {1..120}; do
            code="$(curl -s -L -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/install || true)"
            if [[ "$code" != "" && "$code" -lt 500 ]]; then
              echo "nopCommerce reachable, http_code=$code"
              exit 0
            fi
            echo "Waiting for nopCommerce... ($i) code=$code"
            sleep 2
          done

          echo "nopCommerce did not become reachable"
          docker compose logs --no-color --tail=200 nopcommerce || true
          exit 1

      - name: Run Install Setup (headless)
        run: mvn -Dtest=tests.setup.InstallNopCommerceSetup -Dheadless=true test

      - name: Run Smoke Suite
        run: mvn -Dheadless=true test


      - name: Docker logs (on failure)
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=400 nopcommerce || true
          docker compose logs --no-color --tail=400 sqlserver || true
