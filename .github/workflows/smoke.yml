name: NopCommerce Smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Docker version
        run: docker --version

      - name: Start containers
        run: docker compose up -d

      - name: Wait for nopCommerce /install
        run: |
          echo "Waiting for nopCommerce installer..."
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/install || true)
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Installer is up"
              exit 0
            fi
            sleep 5
          done
          echo "Installer did not come up"
          exit 1


      - name: Docker status (before install)
        run: |
          docker compose ps
          docker compose logs --no-color --tail=120 sqlserver || true
          docker compose logs --no-color --tail=120 nopcommerce || true

      - name: Run Install Smoke Test
        run: mvn -B -Dtest=tests.setup.InstallNopCommerceSetup test

      - name: Docker logs (always)
        if: always()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=300 sqlserver || true
          docker compose logs --no-color --tail=300 nopcommerce || true
