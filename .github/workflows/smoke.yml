name: Business Smoke

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Start Docker
        run: |
          docker compose up -d
          docker compose ps

      - name: Wait for nopCommerce /install
        run: |
          echo "Waiting for http://127.0.0.1:5000/install ..."
          for i in {1..120}; do
            code=$(curl -s -L -o /tmp/install.html -w "%{http_code}" http://127.0.0.1:5000/install || true)
            if [ "$code" = "200" ]; then
              echo "install page ready"
              exit 0
            fi
            sleep 2
          done
          echo "install page did not become ready"
          echo "--- last response head ---"
          head -n 40 /tmp/install.html || true
          exit 1

      - name: Docker status
        run: |
          docker compose ps
          docker compose logs --no-color --tail=120 sqlserver || true
          docker compose logs --no-color --tail=120 nopcommerce || true

      - name: Run install (only)
        run: |
          mvn -Dtest=tests.setup.InstallNopCommerceSetup -Dheadless=true test

      - name: Probe after install (curl)
        if: always()
        run: |
          echo "Probing home..."
          curl -s -L -o /dev/null -w "home http_code=%{http_code} url=%{url_effective}\n" http://127.0.0.1:5000 || true
          echo "Probing install..."
          curl -s -L -o /dev/null -w "install http_code=%{http_code} url=%{url_effective}\n" http://127.0.0.1:5000/install || true

      - name: Docker logs (always)
        if: always()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=300 sqlserver || true
          docker compose logs --no-color --tail=300 nopcommerce || true
