name: Business Smoke

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Start nopCommerce (Docker)
        run: |
          docker compose up -d
          docker compose ps

      - name: Wait for SQL Server to be ready
        run: |
          echo "Waiting for SQL Server logs: 'ready for client connections'..."
          for i in {1..120}; do
            if docker compose logs --no-color sqlserver | grep -qi "ready for client connections"; then
              echo "SQL Server is ready!"
              exit 0
            fi
            echo "SQL not ready yet (try $i)..."
            sleep 2
          done

          echo "SQL Server not ready after 240s"
          docker compose ps || true
          docker compose logs --no-color --tail=300 sqlserver || true
          exit 1

      - name: Wait for nopCommerce /install page
        run: |
          echo "Waiting for nopCommerce to respond on http://localhost:5000/install ..."
          for i in {1..120}; do
            code="$(curl -s -L -o /tmp/install.html -w "%{http_code}" http://localhost:5000/install || true)"
            echo "HTTP: $code (try $i)"
            if [ "$code" = "200" ]; then
              echo "nopCommerce /install reachable!"
              exit 0
            fi
            sleep 2
          done

          echo "nopCommerce not reachable after 240s"
          echo "=== docker compose ps ==="
          docker compose ps || true
          echo "=== nopcommerce logs ==="
          docker compose logs --no-color --tail=300 nopcommerce || true
          echo "=== first 120 lines of HTML ==="
          head -n 120 /tmp/install.html || true
          exit 1

      - name: Install nopCommerce (if needed)
        run: mvn -Dtest=tests.setup.InstallNopCommerceSetup -Dheadless=true test

      - name: Verify app is installed (not on /install)
        run: |
          final_url="$(curl -s -L -o /dev/null -w "%{url_effective}" http://localhost:5000 || true)"
          echo "Final URL: $final_url"
          if echo "$final_url" | grep -qi "/install"; then
            echo "Still on /install after installer test -> FAIL"
            echo "=== nopcommerce logs ==="
            docker compose logs --no-color --tail=300 nopcommerce || true
            echo "=== sqlserver logs ==="
            docker compose logs --no-color --tail=300 sqlserver || true
            exit 1
          fi
          echo "Installed OK."

      - name: Run smoke tests (headless)
        run: mvn -Dtest=tests.smoke.* -Dheadless=true test

      - name: Print surefire reports
        if: failure()
        run: |
          echo "=== Surefire reports ==="
          ls -la target/surefire-reports || true

          echo "=== Dump *.txt (if any) ==="
          for f in target/surefire-reports/*.txt; do
            echo "----- $f -----"
            cat "$f" || true
          done

          echo "=== Dump TEST-*.xml headers ==="
          for f in target/surefire-reports/TEST-*.xml; do
            echo "----- $f -----"
            head -n 80 "$f" || true
          done

      - name: Docker logs (nopcommerce + sqlserver)
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color --tail=400 nopcommerce || true
          docker compose logs --no-color --tail=400 sqlserver || true

      - name: Shutdown docker
        if: always()
        run: docker compose down -v
